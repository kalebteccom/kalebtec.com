  <rect x="20" y="20" width="460" height="460" rx="80" fill="#080F11"/>
  <rect x="120" y="140" width="220" height="44" rx="22" fill="#F1F0E4"/>
  <rect x="120" y="228" width="170" height="44" rx="22" fill="#F1F0E4"/>
  <rect x="120" y="316" width="260" height="44" rx="22" fill="#8000FF"/>
</svg>
