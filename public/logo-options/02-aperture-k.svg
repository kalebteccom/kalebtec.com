<!--
  Option 2 — Aperture K
  A K formed by negative space inside a brand-purple rounded square. The
  spine and arms are cut as paper-cream voids, so the mark reads as a
  positive K either way (cream on purple from within, ink on cream when
  the brand bg is replaced). Strong silhouette at favicon size.
-->
<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="cut-k">
      <rect width="500" height="500" fill="white"/>
      <path d="M170 120 L170 380" stroke="black" stroke-width="48" stroke-linecap="round"/>
      <path d="M170 250 L330 120" stroke="black" stroke-width="48" stroke-linecap="round"/>
      <path d="M170 250 L330 380" stroke="black" stroke-width="48" stroke-linecap="round"/>
    </mask>
  </defs>
  <rect width="500" height="500" rx="100" fill="#8000FF" mask="url(#cut-k)"/>
</svg>
