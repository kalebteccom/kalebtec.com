[build]
  command = "pnpm generate:types && pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "nft"
  external_node_modules = ["sharp"]

[functions."___netlify-server-handler"]
  timeout = 26

# Keep SSR functions warm to reduce cold starts
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
